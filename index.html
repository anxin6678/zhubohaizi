<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主播女孩重度依赖 - 完美融合版</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'DotGothic16', 'SimSun', monospace; background: repeating-linear-gradient(-45deg, #ffb8c6, #ffb8c6 20px, #ff9eb1 20px, #ff9eb1 40px); user-select: none; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%); background-size: 100% 3px; z-index: 9998; pointer-events: none; }
        .window { position: absolute; box-shadow: 3px 3px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .title-bar { cursor: grab; background: linear-gradient(90deg, #000080, #1084d0); }
        .window-body { flex-grow: 1; margin: 6px; display: flex; flex-direction: column; overflow: hidden; background: #c0c0c0;}
        
        #win-jine { width: 340px; height: 500px; left: 30px; top: 30px; }
        .jine-bg { background: #82ccdd; flex-grow: 1; border: inset 2px; display: flex; flex-direction: column; overflow: hidden; }
        .jine-header { background: #60a3bc; padding: 5px; color: white; text-align: center; font-weight: bold; border-bottom: solid 2px #3c6382; }
        .jine-chat { flex-grow: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; align-items: flex-start; gap: 8px; width: 100%; }
        .msg-wrap.player { flex-direction: row-reverse; }
        .msg-avatar { width: 36px; height: 36px; background: #fff; border-radius: 50%; border: 2px solid #2f3640; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;}
        .msg-bubble { max-width: 65%; padding: 8px 12px; border-radius: 15px; font-size: 14px; line-height: 1.5; background: #fff; border: 2px solid #2f3640; word-wrap: break-word;}
        .player .msg-bubble { background: #78e08f; }

        #win-stats { width: 300px; left: 400px; top: 30px; }
        .stat-panel { background: #fff; border: inset 2px; padding: 10px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin: 8px 0 2px 0; font-weight: bold;}
        .stat-bar-bg { width: 100%; border: inset 2px; height: 16px; background: #e0e0e0; }
        .stat-bar-fill { height: 100%; transition: width 0.3s; }

        #win-actions { width: 300px; left: 400px; top: 300px; }
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 4px; }
        .action-btn { height: 50px; cursor: pointer; border: outset 2px; background: #dfdfdf; font-weight: bold;}
        .action-btn:active { border: inset 2px; }
    </style>
</head>
<body class="crt">

<div class="window" id="win-jine">
    <div class="title-bar"><div class="title-bar-text">💬 JINE</div></div>
    <div class="window-body">
        <div class="jine-bg">
            <div class="jine-header">🎀 糖糖 🎀</div>
            <div class="jine-chat" id="jine-history"></div>
        </div>
    </div>
</div>

<div class="window" id="win-stats">
    <div class="title-bar"><div class="title-bar-text">📊 Taskmgr.exe</div></div>
    <div class="window-body">
        <div class="stat-panel">
            <div style="text-align: center; font-size: 20px; font-weight: bold;" id="ui-day">DAY 1</div>
            <div style="text-align: center; color: #0984e3; font-size: 24px; font-weight: bold;" id="ui-fans">0 粉丝</div>
            
            <div class="stat-row"><span>压力</span><span id="ui-stress-val">10/120</span></div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="ui-stress-bar" style="background: #e17055; width: 8%;"></div></div>
            
            <div class="stat-row"><span>好感</span><span id="ui-aff-val">50/100</span></div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="ui-aff-bar" style="background: #fd79a8; width: 50%;"></div></div>
        </div>
    </div>
</div>

<div class="window" id="win-actions">
    <div class="title-bar"><div class="title-bar-text">⚙️ Actions</div></div>
    <div class="window-body" style="background: #fff; border: inset 2px;">
        <div class="action-grid">
            <button class="action-btn" onclick="game.executeAction('play')">🎮 打游戏</button>
            <button class="action-btn" onclick="game.executeAction('internet')">🌐 上网</button>
            <button class="action-btn" onclick="game.executeAction('sleep')">🛏️ 睡觉</button>
            <button class="action-btn" onclick="game.executeAction('stream')" style="background: #fab1a0;">📺 直播</button>
        </div>
    </div>
</div>

<script>
class NeedyEngine {
    constructor() {
        // 核心数据模型与 Proxy 代理拦截
        this.state = new Proxy({
            day: 1,
            stats: { stress: 10, affection: 50, darkness: 20, fans: 0 },
            isGameOver: false
        }, {
            set: (target, prop, value) => { target[prop] = value; return true; }
        });

        this.statsProxy = new Proxy(this.state.stats, {
            set: (target, prop, value) => {
                const max = prop === 'fans' ? Infinity : (prop === 'stress' ? 120 : 100);
                target[prop] = Math.max(0, Math.min(value, max));
                this.updateUI(); // 数值改变，自动刷新UI
                this.checkEvents();
                return true;
            }
        });

        this.messageQueue = [];
        this.isProcessing = false;
        
        // 初始化绑定 UI 并拖拽
        this.updateUI();
        this.makeDraggable();
        this.queueMsg("阿P，游戏引擎重启成功啦！", "ame");
    }

    updateUI() {
        document.getElementById('ui-day').innerText = `DAY ${this.state.day}`;
        document.getElementById('ui-fans').innerText = `${this.statsProxy.fans.toLocaleString()} 粉丝`;
        document.getElementById('ui-stress-val').innerText = `${this.statsProxy.stress}/120`;
        document.getElementById('ui-stress-bar').style.width = `${(this.statsProxy.stress / 120) * 100}%`;
        document.getElementById('ui-aff-val').innerText = `${this.statsProxy.affection}/100`;
        document.getElementById('ui-aff-bar').style.width = `${this.statsProxy.affection}%`;
    }

    checkEvents() {
        if (this.state.isGameOver) return;
        if (this.statsProxy.stress >= 120) {
            this.state.isGameOver = true;
            this.queueMsg("头好痛...受不了了...", "ame", 500);
            setTimeout(() => alert("【结局】压力过载，游戏结束！"), 2000);
        }
    }

    executeAction(action) {
        if (this.state.isGameOver) return;
        switch(action) {
            case 'play':
                this.statsProxy.stress -= 15; this.statsProxy.affection += 10;
                this.queueMsg("打游戏最开心了！", "ame");
                break;
            case 'internet':
                this.statsProxy.stress -= 5;
                this.queueMsg("在网上找了找素材。", "ame");
                break;
            case 'sleep':
                this.statsProxy.stress -= 30; this.state.day++;
                this.queueMsg("睡得好饱，阿P早安！", "ame");
                this.updateUI();
                break;
            case 'stream':
                const fansGained = Math.floor(Math.random() * 500) + 100 * this.state.day;
                this.statsProxy.stress += 25; this.statsProxy.fans += fansGained;
                this.queueMsg(`开播啦！涨了 ${fansGained} 粉。`, "ame");
                this.queueMsg("直播好累，想吐...", "ame", 1000);
                break;
        }
    }

    queueMsg(text, sender, delay = 800) {
        this.messageQueue.push({ text, sender, delay });
        if (!this.isProcessing) this.processQueue();
    }

    async processQueue() {
        this.isProcessing = true;
        const box = document.getElementById('jine-history');
        while (this.messageQueue.length > 0) {
            const msg = this.messageQueue.shift();
            await new Promise(r => setTimeout(r, msg.delay));
            
            const div = document.createElement('div');
            div.className = `msg-wrap ${msg.sender === 'p' ? 'player' : ''}`;
            div.innerHTML = `<div class="msg-avatar">${msg.sender === 'p' ? 'P' : '🎀'}</div><div class="msg-bubble">${msg.text}</div>`;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }
        this.isProcessing = false;
    }

    makeDraggable() {
        document.querySelectorAll('.window').forEach(win => {
            const title = win.querySelector('.title-bar');
            let isDown = false, startX, startY, winX, winY;
            title.addEventListener('mousedown', e => {
                isDown = true; startX = e.clientX; startY = e.clientY;
                winX = win.offsetLeft; winY = win.offsetTop;
            });
            document.addEventListener('mousemove', e => {
                if (!isDown) return;
                win.style.left = (winX + e.clientX - startX) + 'px';
                win.style.top = (winY + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => isDown = false);
        });
    }
}

// 启动游戏
const game = new NeedyEngine();
</script>
</body>
</html>
