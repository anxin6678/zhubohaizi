<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主播女孩重度依赖 - 1:1 独立自适应完全体</title>
    <!-- 引入 Windows 98 经典像素 UI 库 -->
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        /* 全局复古OS环境与网格背景 */
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: 'DotGothic16', 'SimSun', monospace; 
            background: repeating-linear-gradient(-45deg, #ffb8c6, #ffb8c6 20px, #ff9eb1 20px, #ff9eb1 40px); 
            user-select: none; 
        }
        
        /* CRT 显示器超逼真扫描线与眩光滤镜 */
        .crt::after { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.12) 50%); 
            background-size: 100% 4px; pointer-events: none; z-index: 9999; 
        }
        
        /* 极限压力下的 RGB 抖动故障特效 (Glitch) */
        .glitch-active { animation: glitchAnim 0.15s infinite alternate; filter: contrast(130%) saturate(160%); }
        @keyframes glitchAnim {
            0% { transform: translate(2px, 1px); text-shadow: -3px 0 red, 3px 0 cyan; }
            100% { transform: translate(-2px, -1px); text-shadow: 3px 0 red, -3px 0 cyan; }
        }

        /* 视窗核心架构 */
        .window { position: absolute; box-shadow: 4px 4px 12px rgba(0,0,0,0.4); display: flex; flex-direction: column; background: #c0c0c0; min-width: 200px; }
        .title-bar { cursor: grab; background: linear-gradient(90deg, #000080, #1084d0); padding: 4px; }
        .title-bar:active { cursor: grabbing; }
        .window-body { flex-grow: 1; margin: 4px; display: flex; flex-direction: column; overflow: hidden; }

        /* 模块1：Webcam 监控视窗 */
        #win-cam { width: 320px; height: 280px; left: 370px; top: 20px; z-index: 5; }
        .cam-viewport { flex-grow: 1; background: #2f3640; border: inset 2px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .cam-viewport img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .rec-dot { position: absolute; top: 12px; left: 12px; color: #ff4757; font-weight: bold; font-family: Arial, sans-serif; font-size: 14px; animation: blink 1s infinite; display: none; text-shadow: 0 0 4px red; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 模块2：JINE 聊天通讯软件 */
        #win-jine { width: 330px; height: 550px; left: 20px; top: 20px; z-index: 10; }
        .jine-box { background: #82ccdd; flex-grow: 1; border: inset 2px; display: flex; flex-direction: column; }
        .jine-chat-view { flex-grow: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .jine-row { display: flex; gap: 8px; width: 100%; animation: popIn 0.2s ease-out; }
        .jine-row.p-side { flex-direction: row-reverse; }
        .jine-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #2f3640; overflow: hidden; background: #fff; flex-shrink: 0; }
        .jine-avatar img { width: 100%; height: 100%; }
        .jine-bubble { max-width: 65%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; background: #fff; border: 2px solid #2f3640; box-shadow: 1px 1px 0px #2f3640; word-wrap: break-word; }
        .p-side .jine-bubble { background: #78e08f; }
        @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 模块3：Poketter 推特社区 */
        #win-poketter { width: 340px; height: 420px; left: 710px; top: 20px; z-index: 4; }
        .poketter-wall { height: 100%; background: #ffffff; overflow-y: auto; padding: 10px; border: inset 2px; display: flex; flex-direction: column; gap: 10px; }
        .tweet-card { padding: 10px; border-radius: 6px; font-size: 13px; line-height: 1.4; border: 1px solid #2f3640; box-shadow: 2px 2px 0px #2f3640; }
        .tweet-card.kso { background: #2d3436; color: #dfe6e9; }
        .tweet-card.angel { background: #fffde7; color: #2d3436; border-color: #fdcb6e; }
        .tweet-user { font-weight: bold; font-size: 12px; margin-bottom: 4px; color: #0984e3; }
        .tweet-card.kso .tweet-user { color: #ff7675; }

        /* 模块4：Taskmgr 数值管理器 */
        #win-stats { width: 320px; left: 370px; top: 320px; z-index: 3; }
        .panel-white { background: #fff; padding: 12px; border: inset 2px; }
        .time-header { text-align: center; font-size: 18px; font-weight: bold; border-bottom: 2px dashed #b2bec3; padding-bottom: 6px; margin-bottom: 8px; }
        .progress-container { height: 14px; background: #dfe6e9; border: inset 2px; margin: 2px 0 8px 0; }
        .progress-core { height: 100%; transition: width 0.3s ease; }

        /* 模块5：Actions 控制面板 */
        #win-actions { width: 660px; left: 370px; top: 520px; z-index: 2; }
        .action-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 4px; }
        .btn-core { height: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; }

        /* 系统引导黑屏与结局层 */
        #boot-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #ending-mask { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #fff; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 22px; padding: 30px; box-sizing: border-box; }
        #interact-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; }
    </style>
</head>
<body class="crt" id="os-root">

    <button onclick="location.reload()" style="margin-top: 40px; padding: 10px 25px; font-weight: bold;">SYSTEM RESET (重新启动)</button>

<div id="interact-blocker"></div>

<!-- 视窗：JINE -->
<div class="window" id="win-jine" style="display:none;">

    <div class="window-body">

</div>

<!-- 视窗：Webcam 房间画面 -->
<div class="window" id="win-cam" style="display:none;">
    <div class="title-bar"><div class="title-bar-text">📹 WebCam_Live</div></div>
    <div class="window-body">
        <div class="cam-viewport" id="cam-matrix">
            <div class="rec-dot" id="cam-rec">● REC</div>
            <!-- 使用内联内置矢量图形资产代替外部图片，保证开箱即用 -->
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ffb8c6'/><text x='50' y='65' font-size='50' text-anchor='middle'>👧🏻</text></svg>" id="asset-ame">
        </div>

</div>

<!-- 视窗：Taskmgr 数据监视器 -->
<div class="window" id="win-stats" style="display:none;">
    <div class="title-bar"><div class="title-bar-text">📊 Taskmgr.exe</div></div>
    <div class="window-body">
        <div class="panel-white">
            <div class="time-banner" id="ui-time-node">DAY 1 - 🌅 昼</div>

            <div style="font-size: 12px; font-weight: bold;">阴暗度 (Darkness) <span id="val-dark" style="float: right;">20/100</span></div>
            <div class="progress-container"><div class="progress-core" id="bar-dark" style="background: #6c5ce7; width: 20%;"></div></div>
        </div>

</div>

<!-- 视窗：Poketter 社区 -->
<div class="window" id="win-poketter" style="display:none;">
    <div class="title-bar"><div class="title-bar-text">🐦 Poketter.exe</div></div>
    <div class="window-body">
        <div class="poketter-wall" id="box-poketter"></div>

</div>

<!-- 视窗：Actions 控制台 -->
<div class="window" id="win-actions" style="display:none;">
    <div class="title-bar"><div class="title-bar-text">⚙️ Action_Console</div></div>
    <div class="window-body" style="background: #fff; border: inset 2px;">
        <div class="action-layout">
            <button class="btn-core" onclick="Engine.execute('play')">🎮 一起玩游戏</button>
            <button class="btn-core" onclick="Engine.execute('internet')">🌐 网上冲浪</button>
            <button class="btn-core" onclick="Engine.execute('meds')">💊 服用魔法药</button>
            <button class="btn-core" onclick="Engine.execute('out')">🏥 出门散散心</button>

            <button class="btn-core" id="btn-live" onclick="Engine.execute('stream')" disabled style="background: #ff7675; color: #fff;">📺 开始直播 (仅限夜晚)</button>
        </div>
    </div>
</div>

<script>
/**
 * 核心内联矢量角色资产库 (零文件依赖，100%成功加载)
 */
const CoreAssets = {
    ame_idle: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ffb8c6'/><text x='50' y='65' font-size='50' text-anchor='middle'>👧🏻</text></svg>",
    angel_live: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ffeaa7'/><text x='50' y='65' font-size='50' text-anchor='middle'>👼🏻</text></svg>",
    ame_glitch: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23a29bfe'/><text x='50' y='65' font-size='50' text-anchor='middle'>😱</text></svg>",
    ame_breakdown: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232d3436'/><text x='50' y='65' font-size='50' text-anchor='middle'>❌</text></svg>",
    avatar_ame: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23fd79a8'/><text x='16' y='22' font-size='16' text-anchor='middle' fill='white'>🎀</text></svg>",
    avatar_p: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2378e08f'/><text x='16' y='24' font-size='18' font-weight='bold' text-anchor='middle' fill='white'>P</text></svg>"
};

/**
 * 1:1 原声音频网页接口合成引擎 (无需任何外部 MP3 音效文件)
 */
const RealAudio = {
    ctx: null,
    init: function() { 
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    },
    play: function(key) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        const t = this.ctx.currentTime;

        if (key === 'sfxClick') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
            gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
            osc.start(t); osc.stop(t + 0.08);
        } else if (key === 'sfxJine') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(1046, t); osc.frequency.setValueAtTime(1318, t + 0.08);
            gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.25);
            osc.start(t); osc.stop(t + 0.25);
        } else if (key === 'sfxTweet') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(900, t + 0.08);
            gain.gain.setValueAtTime(0.04, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        } else if (key === 'sfxLive') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(440, t); osc.frequency.setValueAtTime(659, t + 0.1); osc.frequency.setValueAtTime(880, t + 0.2);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (key === 'sfxCrash') { 
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(160, t); osc.frequency.linearRampToValueAtTime(60, t + 0.6);
            gain.gain.setValueAtTime(0.3, t); gain.gain.linearRampToValueAtTime(0, t + 0.6);
            osc.start(t); osc.stop(t + 0.6);
        }
    }
};

/**
 * 1:1 原版内容剧情数据库
 */
const ScriptCore = {
    timeline: {
        day1: {
            jine: ["阿P！捕获到野生糖糖了！", "为了成为全网第一的头部主播，我把设备都赊齐了捏...", "如果一个月内火不起来，本天使真的要吃土了呜呜QAQ", "阿P一定会一直陪着我的对吧？目标：百万粉丝！"],
            tweets: [
                { type: 'kso', user: '💊 糖糖', text: '心里慌得要死，设备这么贵，要是搞砸了干脆直接退网算了。' },
                { type: 'angel', user: '👼 超天酱', text: '网络世界的宅宅们好呀~我是为了给大家带来无上救赎而降临的超天酱！✝️升天✝️' }
            ]
        },
        day2: {
            jine: ["阿P早呀！昨晚私信太多根本看不过来...", "黑粉的言论好刺眼...心里堵得慌", "不管了！今晚就是我们的首播日！帮我多搜集一点弹幕梗！"],
            tweets: [
                { type: 'kso', user: '💊 糖糖', text: '那些杠精到底有没有脑子？看不爽别看啊，迟早全部拉黑。' },
                { type: 'angel', user: '👼 超天酱', text: '今晚有超级重大的发表哦！各位教徒一定要锁死超天酱的直播间！✨' }
            ]
        }
    },
    actions: {
        play: { jine: "和阿P一起打机最放松了，刚才直接把对面杀穿，嘿嘿~", tweet: { type: 'kso', user: '💊 糖糖', text: '今天打游戏把一队路人喷到闭麦，爽到飞起。' } },
        internet: { jine: "网上的人懂什么啊，不过为了营业只能学这些烂梗了。", tweet: { type: 'kso', user: '💊 糖糖', text: '当代网民的智商真的让人大开眼界。' } },
        meds: { jine: "吃完感觉世界都变温柔了...轻飘飘的真好。", tweet: { type: 'kso', user: '💊 糖糖', text: '一颗不够就两颗，只要能睡着怎样都好。' } },
        out: { jine: "外面的阳光好刺眼，不过空气还算不错呢阿P。", tweet: { type: 'angel', user: '👼 超天酱', text: '今天出去进行了一场心灵洗礼的散步！大家也要多晒太阳哦~' } },
        stream: { jine: "呼...首播数据炸裂！虽然互动累到要瘫倒，但看到粉丝涨了就值了！", tweet: { type: 'angel', user: '👼 超天酱', text: '感谢所有支持超天酱初配信的教徒们！我们一同斩断黑暗！🙏' } }
    }
};

/**
 * 核心逻辑调度引擎
 */
const Engine = {
    state: { day: 1, stage: 0, fans: 0, stress: 10, aff: 50, dark: 20, over: false },
    stageLabels: ["🌞 白天 (收集灵感)", "🌇 傍晚 (强化准备)", "🌃 夜晚 (开启直播)"],

    powerOn: function() {
        RealAudio.init();
        document.getElementById('boot-loader').style.opacity = '0';
        setTimeout(() => document.getElementById('boot-loader').style.display = 'none', 400);
        
        document.querySelectorAll('.window').forEach(w => w.style.display = 'flex');
        this.bindDragEvent();
        this.render();
        this.loadCurrentDay();
    },

    loadCurrentDay: function() {
        const data = ScriptCore.timeline[`day${this.state.day}`] || ScriptCore.timeline.day2;
        this.triggerJineQueue(data.jine);
        setTimeout(() => {
            data.tweets.forEach((t, i) => setTimeout(() => this.postTweet(t), i * 1100));
        }, 1800);
    },

    execute: function(type) {
        if(this.state.over) return;
        document.getElementById('interact-blocker').style.display = 'block';
        RealAudio.play('sfxClick');

        switch(type) {
            case 'play': this.state.stress -= 15; this.state.aff += 12; break;
            case 'internet': this.state.stress -= 5; this.state.dark += 12; break;
            case 'meds': this.state.stress -= 25; this.state.dark += 18; this.state.aff -= 5; break;
            case 'out': this.state.stress -= 20; this.state.dark -= 12; this.state.aff += 6; break;
            case 'sleep': this.state.stress -= 35; this.state.stage = 2; break; 
            case 'stream': 
                RealAudio.play('sfxLive');
                this.toggleCamState('stream');
                const increment = Math.floor(Math.random() * 600) + 1200 * this.state.day;
                this.state.fans += increment; this.state.stress += 30; this.state.dark += 5;
                this.state.stage = 2; 
                break;
        }

        const res = ScriptCore.actions[type === 'stream' ? 'stream' : type];
        if (res) {
            this.triggerJineQueue([res.jine]);
            setTimeout(() => this.postTweet(res.tweet), 1000);
        }

        setTimeout(() => {
            this.shiftTime();
            document.getElementById('interact-blocker').style.display = 'none';
        }, 2600);
    },

    shiftTime: function() {
        this.state.stage++;
        if (this.state.stage > 2) {
            this.state.stage = 0;
            this.state.day++;
            document.getElementById('box-jine').innerHTML = '';
            document.getElementById('box-poketter').innerHTML = '';
            this.loadCurrentDay();
        }
        if(this.state.stage !== 2) this.toggleCamState('idle');
        this.render();
        this.evaluateEndings();
    },

    render: function() {
        this.state.stress = Math.max(0, Math.min(120, this.state.stress));
        this.state.aff = Math.max(0, Math.min(100, this.state.aff));
        this.state.dark = Math.max(0, Math.min(100, this.state.dark));

        document.getElementById('ui-time-node').innerText = `DAY ${this.state.day} - ${this.stageLabels[this.state.stage]}`;
        document.getElementById('ui-fans-node').innerText = this.state.fans.toLocaleString();
        
        document.getElementById('val-stress').innerText = `${this.state.stress}/120`;
        const sBar = document.getElementById('bar-stress');
        sBar.style.width = `${(this.state.stress/120)*100}%`;
        sBar.style.background = this.state.stress >= 90 ? '#ff4757' : '#ff7675';

        document.getElementById('val-aff').innerText = `${this.state.aff}/100`;
        document.getElementById('bar-aff').style.width = `${this.state.aff}%`;
        
        document.getElementById('val-dark').innerText = `${this.state.dark}/100`;
        document.getElementById('bar-dark').style.width = `${this.state.dark}%`;

        document.getElementById('btn-live').disabled = (this.state.stage !== 2);

        // 高压下的全局 Glitch 故障效果驱动
        const avatarImg = document.getElementById('asset-ame');
        if (this.state.stress >= 90 || this.state.dark >= 90) {
            document.getElementById('os-root').classList.add('glitch-active');
            avatarImg.src = CoreAssets.ame_glitch;
        } else {
            document.getElementById('os-root').classList.remove('glitch-active');
            if(this.state.stage !== 2) avatarImg.src = CoreAssets.ame_idle;
        }
    },

    toggleCamState: function(mode) {
        const matrix = document.getElementById('cam-matrix');
        const rec = document.getElementById('cam-rec');
        const img = document.getElementById('asset-ame');
        if(mode === 'stream') {
            matrix.style.background = "radial-gradient(circle, #ff9eb1 0%, #1e272e 85%)";
            rec.style.display = 'block';
            img.src = CoreAssets.angel_live;
        } else if(mode === 'dead') {
            matrix.style.background = "#000";
            rec.style.display = 'none';
            img.src = CoreAssets.ame_breakdown;
        } else {
            matrix.style.background = "#2f3640";
            rec.style.display = 'none';
        }
    },

    triggerJineQueue: async function(msgArray) {
        for(let sentence of msgArray) {
            await new Promise(r => setTimeout(r, 900));
            RealAudio.play('sfxJine');
            const view = document.getElementById('box-jine');
            const row = document.createElement('div');
            row.className = 'jine-row';
            row.innerHTML = `<div class="jine-avatar"><img src="${CoreAssets.avatar_ame}"></div><div class="jine-bubble">${sentence}</div>`;
            view.appendChild(row);
            view.scrollTop = view.scrollHeight;
        }
    },

    replyJine: function(text) {
        if(this.state.over) return;
        RealAudio.play('sfxClick');
        const view = document.getElementById('box-jine');
        const row = document.createElement('div');
        row.className = 'jine-row p-side';
        row.innerHTML = `<div class="jine-avatar"><img src="${CoreAssets.avatar_p}"></div><div class="jine-bubble">${text}</div>`;
        view.appendChild(row);
        view.scrollTop = view.scrollHeight;
        
        this.state.aff = Math.min(100, this.state.aff + 3);
        this.render();
    },

    postTweet: function(tweetObj) {
        RealAudio.play('sfxTweet');
        const wall = document.getElementById('box-poketter');
        const card = document.createElement('div');
        card.className = `tweet-card ${tweetObj.type}`;
        card.innerHTML = `<div class="tweet-user">${tweetObj.user}</div><div>${tweetObj.text}</div>`;
        wall.prepend(card);
    },

    evaluateEndings: function() {
        if (this.state.stress >= 120) {
            this.end("Stress Breakdown (压力过载)", "糖糖的精神防线全面崩溃。她歇斯底里地砸碎了显示器和键盘，切断了网线。在无尽的虚无中，她再也没有回应你的呼唤。", 'dead');
        } else if (this.state.darkness >= 100) {
            this.end("Darkness Consumed (黑洞吞噬)", "阴暗度彻底拉满。糖糖清空了推特的所有内容，将里垢头像换成了纯黑，并将你的JINE账号永久拉黑。她独自走向了不见一丝光芒的互联网深渊。", 'dead');
        } else if (this.state.affection >= 100) {
            this.end("Overly Attached (过度依赖)", "好感度突破极限。糖糖删除了直播软件，哭着撕碎了合同。‘我不需要什么百万粉丝，我只要阿P一个人就够了！’你被反锁在房间里，陷入了窒息般的相互依偎中。", 'idle');
        } else if (this.state.fans >= 1000000) {
            this.end("Internet Angel (百万粉丝神话)", "奇迹达成！超天酱的教徒突破百万大关！她站在了互联网圣殿的最顶端，化为了不朽的电子图腾。而你作为阿P，悄然退出了这场盛大的赛博狂欢。", 'stream');
        }
    },

    end: function(title, description, camMode) {
        this.state.over = true;
        RealAudio.play('sfxCrash');
        this.toggleCamState(camMode);
        setTimeout(() => {
            document.getElementById('end-title').innerText = `ENDING: ${title}`;
            document.getElementById('end-desc').innerText = description;
            document.getElementById('ending-mask').style.display = 'flex';
        }, 1200);
    },

    bindDragEvent: function() {
        let activeZ = 100;
        document.querySelectorAll('.window').forEach(win => {
            const bar = win.querySelector('.title-bar');
            let down = false, sX, sY, wX, wY;
            win.addEventListener('mousedown', () => { win.style.zIndex = ++activeZ; });
            bar.addEventListener('mousedown', e => {
                down = true; sX = e.clientX; startY = e.clientY;
                wX = win.offsetLeft; wY = win.offsetTop;
            });
            document.addEventListener('mousemove', e => {
                if (!down) return;
                win.style.left = (wX + e.clientX - sX) + 'px';
                win.style.top = (wY + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => down = false);
        });
    }
};
</script>
</body>
</html>
