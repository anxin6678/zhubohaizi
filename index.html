<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>TT风语音聊天室</title>
    <style>
        :root {
            --bg-color: #12121a;
            --panel-color: #1c1c28;
            --accent-color: #7b2cbf;
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --seat-speaking: #00f5d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 主容器，适配手机与PC */
        .room-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: radial-gradient(circle at top, #2c1a4d 0%, var(--bg-color) 70%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 头部状态栏 */
        .room-header {
            padding: 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .room-title h3 { font-size: 18px; font-weight: 600; }
        .room-title p { font-size: 12px; color: var(--text-secondary); margin-top: 2px;}

        /* 麦位区（8个麦位） */
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px 10px;
            padding: 20px 15px;
        }
        .seat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .avatar-wrap {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid transparent;
        }
        /* 正在说话的光圈效果 */
        .seat-item.speaking .avatar-wrap {
            border-color: var(--seat-speaking);
            box-shadow: 0 0 10px var(--seat-speaking);
            animation: ripple 1.2s infinite ease-in-out;
        }
        .avatar-wrap img {
            width: 47px;
            height: 47px;
            border-radius: 50%;
            object-fit: cover;
        }
        .seat-index {
            position: absolute;
            bottom: -2px;
            background: var(--accent-color);
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
        }
        .user-name {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            max-width: 65px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        /* 公屏聊天区 */
        .chat-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* 丝滑滚动 */
            -webkit-overflow-scrolling: touch; 
        }
        .msg-item {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            max-width: 85%;
            align-self: flex-start;
            line-height: 1.4;
        }
        .msg-item .sender { color: #17c3b2; font-weight: bold; margin-right: 5px;}
        .msg-system {
            background: rgba(234, 84, 85, 0.1);
            color: #ea5455;
            align-self: center;
            font-size: 12px;
        }

        /* 底部控制栏 */
        .bottom-bar {
            padding: 15px;
            background: rgba(28, 28, 40, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-box {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .btn-icon.active { background: #ea5455; }

        @keyframes ripple {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="room-container">
    <div class="room-header">
        <div class="room-title">
            <h3>开黑语音开播中...</h3>
            <p>ID: 98765432 · 105人在线</p>
        </div>
        <button class="btn" style="background:#ea5455;" onclick="leaveRoom()">退出</button>
    </div>

    <div class="seats-grid" id="seatsGrid">
        <div class="seat-item speaking">
            <div class="avatar-wrap">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=房主" alt="头像">
                <span class="seat-index">房主</span>
            </div>
            <span class="user-name">大魔王</span>
        </div>
        <div class="seat-item">
            <div class="avatar-wrap">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=麦位2" alt="头像">
                <span class="seat-index">2麦</span>
            </div>
            <span class="user-name">申请连麦</span>
        </div>
        </div>

    <div class="chat-area" id="chatArea">
        <div class="msg-item msg-system">欢迎来到聊天室，请文明发言，禁止传播违规内容。</div>
        <div class="msg-item"><span class="sender">玩家A:</span>有人来打王者吗？缺个辅助！</div>
    </div>

    <div class="bottom-bar">
        <div class="btn-icon" id="micBtn" onclick="toggleMic()">🎤</div>
        <input type="text" class="input-box" id="msgInput" placeholder="聊点什么吧..." onkeypress="handleKeyPress(event)">
        <button class="btn" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    // 初始化其余麦位
    const grid = document.getElementById('seatsGrid');
    for(let i=3; i<=8; i++) {
        grid.innerHTML += `
            <div class="seat-item">
                <div class="avatar-wrap">
                    <span style="color:var(--text-secondary); font-size:20px;">+</span>
                    <span class="seat-index">${i}麦</span>
                </div>
                <span class="user-name">空位</span>
            </div>
        `;
    }

    // 麦克风开关逻辑
    let isMuted = true;
    function toggleMic() {
        isMuted = !isMuted;
        const micBtn = document.getElementById('micBtn');
        if(isMuted) {
            micBtn.innerText = "🔇";
            micBtn.classList.add('active');
            // 这里调用底层的禁用麦克风流代码
        } else {
            micBtn.innerText = "🎤";
            micBtn.classList.remove('active');
            // 这里调用底层的启用麦克风流代码
        }
    }

    // 发送消息
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        const chatArea = document.getElementById('chatArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-item';
        msgDiv.innerHTML = `<span class="sender">我:</span>${text}`;
        chatArea.appendChild(msgDiv);
        
        input.value = '';
        // 自动滚动到底部
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function handleKeyPress(e) {
        if(e.key === 'Enter') sendMsg();
    }

    function leaveRoom() {
        alert('已退出房间');
    }

    // 解决移动端 H5 100vh 被微信/浏览器工具栏遮挡的Bug
    function resetHeight(){
        document.querySelector('.room-container').style.height = window.innerHeight + 'px';
    }
    window.addEventListener('resize', resetHeight);
    resetHeight();
</script>
</body>
</html>
